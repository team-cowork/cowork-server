server:
  port: 8080

spring:
  application:
    name: cowork-gateway
  # Config 서버에서 설정을 가져옴 (라우팅, jwt, resilience4j 등)
  config:
    import: "optional:configserver:http://localhost:8761"
  cloud:
    config:
      retry:
        max-attempts: 10
        initial-interval: 2000
        max-interval: 5000
        multiplier: 1.5
    bus:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    metadata-map:
      prometheus.scrape: "true"
      prometheus.path: /actuator/prometheus

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh, busrefresh, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: authorization
        url: /v3/api-docs/authorization
      - name: user
        url: /v3/api-docs/user
      - name: voice
        url: /v3/api-docs/voice
      - name: chat
        url: /v3/api-docs/chat
    urls-primary-name: user
  api-docs:
    enabled: false
