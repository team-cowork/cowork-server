services:
  mysql:
    image: mysql:8.4.8
    container_name: cowork-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: cowork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8.0
    container_name: cowork-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.2
    container_name: cowork-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cowork-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: cowork-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"

  vault:
    image: hashicorp/vault:2.0.0
    container_name: cowork-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
      - SETFCAP
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8200/v1/sys/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault:2.0.0
    container_name: cowork-vault-init
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://cowork-vault:8200
      VAULT_TOKEN: dev-root-token
      JWT_SECRET: ${JWT_SECRET}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000/cowork-bucket}
    entrypoint: >
      /bin/sh -c "
      vault secrets enable -version=2 -path=secret kv 2>/dev/null || true;
      vault kv put secret/application JWT_SECRET=$${JWT_SECRET} MYSQL_USER=$${MYSQL_USER} MYSQL_PASSWORD=$${MYSQL_PASSWORD} POSTGRES_USER=$${POSTGRES_USER} POSTGRES_PASSWORD=$${POSTGRES_PASSWORD} MINIO_ACCESS_KEY=$${MINIO_ACCESS_KEY} MINIO_SECRET_KEY=$${MINIO_SECRET_KEY} MINIO_PUBLIC_ENDPOINT=$${MINIO_PUBLIC_ENDPOINT} MINIO_INTERNAL_ENDPOINT=$${MINIO_INTERNAL_ENDPOINT} MINIO_PUBLIC_BASE_URL=$${MINIO_PUBLIC_BASE_URL};
      echo 'Vault secrets initialized.';
      exit 0;
      "

  minio:
    image: minio/minio:latest
    container_name: cowork-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: cowork-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-cowork-bucket}
    volumes:
      - ./docker/minio/cors.json:/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc cors set local/$${MINIO_BUCKET} /cors.json;
      exit 0;
      "

  redis:
    image: redis:8.6.2-alpine
    container_name: cowork-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: cowork-livekit
    restart: unless-stopped
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_USE_EXTERNAL_IP: ${LIVEKIT_USE_EXTERNAL_IP:-false}
    ports:
      - "7880:7880"
      - "7881:7881"
    volumes:
      - ./docker/livekit/${LIVEKIT_CONFIG_FILE:-livekit.yaml}:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:7880 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5


  loki:
    image: grafana/loki:3.5.0
    container_name: cowork-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./cowork-monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.5.0
    container_name: cowork-promtail
    restart: unless-stopped
    volumes:
      - ./cowork-monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - cowork_logs:/var/log/cowork:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    depends_on:
      loki:
        condition: service_healthy

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: cowork-blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./cowork-monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: cowork-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./cowork-monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./cowork-monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - ./cowork-monitoring/prometheus/sd:/etc/prometheus/sd:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.0.0
    container_name: cowork-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./cowork-monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./cowork-monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  mysqld_exporter:
    image: prom/mysqld-exporter:v0.17.2
    container_name: cowork-mysqld-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${MYSQL_ROOT_PASSWORD}
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=root"
    depends_on:
      mysql:
        condition: service_healthy

  redis_exporter:
    image: oliver006/redis_exporter:v1.73.0
    container_name: cowork-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  kafka_exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: cowork-kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: cowork-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  mongodb_exporter:
    image: percona/mongodb_exporter:2.9.0
    container_name: cowork-mongodb-exporter
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/admin
    depends_on:
      mongodb:
        condition: service_healthy

  # ── Application Services ───────────────────────────────────────────────────

  cowork-config:
    image: cowork-config:local
    container_name: cowork-config
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      VAULT_HOST: cowork-vault
    ports:
      - "8761:8761"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  cowork-gateway:
    image: cowork-gateway:local
    container_name: cowork-gateway
    restart: unless-stopped
    depends_on:
      cowork-config:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_CONFIG_IMPORT: "optional:configserver:http://cowork-config:8761"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://cowork-config:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  cowork-authorization:
    image: cowork-authorization:local
    container_name: cowork-authorization
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      PORT: "8081"
      DB_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/cowork_authorization?charset=utf8mb4&parseTime=True&loc=Local"
      DATAGSM_CLIENT_ID: ${DATAGSM_CLIENT_ID}
      DATAGSM_TOKEN_URL: https://oauth.authorization.datagsm.kr/v1/oauth/token
      DATAGSM_USERINFO_URL: https://oauth.resource.datagsm.kr/userinfo
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-30m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-2160h}
      EUREKA_SERVER_URL: http://cowork-config:8761/eureka
      EUREKA_INSTANCE_HOST: cowork-authorization
      EUREKA_INSTANCE_PORT: "8081"
      USER_SERVICE_URL: http://cowork-user:8082
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cowork-preference:
    image: cowork-preference:local
    container_name: cowork-preference
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      CONFIG_SERVER_URL: http://cowork-config:8761
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://cowork-config:8761/eureka/
      EUREKA_APP_NAME: cowork-preference
      EUREKA_INSTANCE_HOST: cowork-preference
    ports:
      - "9001:9001"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  cowork-user:
    image: cowork-user:local
    container_name: cowork-user
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      APP_CONFIG_URL: http://cowork-config:8761
      APP_PROFILE: ${APP_PROFILE:-local}
      DATABASE_URL: "ecto://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/cowork_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      DB_JDBC_URL: "jdbc:mysql://mysql:3306/cowork_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_SERVER_URL: http://cowork-config:8761/eureka/
      EUREKA_INSTANCE_HOST: cowork-user
      EUREKA_INSTANCE_PORT: "8082"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "8082:8082"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  cowork-team:
    image: cowork-team:local
    container_name: cowork-team
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_CONFIG_IMPORT: "optional:configserver:http://cowork-config:8761"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cowork_team?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://cowork-config:8761/eureka/
    ports:
      - "8085:8085"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  cowork-channel:
    image: cowork-channel:local
    container_name: cowork-channel
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_CONFIG_IMPORT: "optional:configserver:http://cowork-config:8761"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cowork_channel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://cowork-config:8761/eureka/
    ports:
      - "8083:8083"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  cowork-project:
    image: cowork-project:local
    container_name: cowork-project
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_CONFIG_IMPORT: "optional:configserver:http://cowork-config:8761"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cowork_project?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://cowork-config:8761/eureka/
    ports:
      - "8084:8084"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  cowork-notification:
    image: cowork-notification:local
    container_name: cowork-notification
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      APP_CONFIG_URL: http://cowork-config:8761
      APP_PROFILE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/cowork_notification?charset=utf8mb4&parseTime=True&loc=Local"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_NOTIFICATION: notification.trigger
      KAFKA_GROUP_ID: cowork-notification
      FCM_CREDENTIALS_FILE: /run/secrets/firebase-credentials.json
      PREFERENCE_SERVICE_URL: http://cowork-preference:9001
      TEAM_SERVICE_URL: http://cowork-team:8085
      USER_SERVICE_URL: http://cowork-user:8082
      EUREKA_SERVER_URL: http://cowork-config:8761/eureka
      EUREKA_INSTANCE_HOST: cowork-notification
    ports:
      - "8086:8086"
    volumes:
      - ./docker/secrets/firebase-credentials.json:/run/secrets/firebase-credentials.json:ro
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cowork-chat:
    image: cowork-chat:local
    container_name: cowork-chat
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cowork-config:
        condition: service_healthy
    environment:
      PORT: "8087"
      NODE_ENV: production
      MONGODB_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/cowork_chat?authSource=admin"
      MONGODB_DIRECT_CONNECTION: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://cowork-config:8761/eureka
      EUREKA_INSTANCE_HOST: cowork-chat
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-cowork-bucket}
      MINIO_CHAT_MAX_FILE_SIZE_BYTES: ${MINIO_CHAT_MAX_FILE_SIZE_BYTES:-104857600}
      MINIO_CHAT_ALLOWED_CONTENT_TYPES: ${MINIO_CHAT_ALLOWED_CONTENT_TYPES:-video/mp4,video/quicktime,video/x-msvideo,audio/mpeg,audio/ogg,audio/wav,audio/mp4,image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain}
      MINIO_CHAT_UPLOAD_RATE_LIMIT_WINDOW_MS: ${MINIO_CHAT_UPLOAD_RATE_LIMIT_WINDOW_MS:-60000}
      MINIO_CHAT_UPLOAD_RATE_LIMIT_MAX_REQUESTS: ${MINIO_CHAT_UPLOAD_RATE_LIMIT_MAX_REQUESTS:-20}
    ports:
      - "8087:8087"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  cowork-voice:
    image: cowork-voice:local
    container_name: cowork-voice
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      livekit:
        condition: service_healthy
      cowork-channel:
        condition: service_healthy
    environment:
      PORT: "8084"
      MONGODB_URI: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/cowork_voice?authSource=admin"
      MONGODB_DB: cowork_voice
      LIVEKIT_URL: http://cowork-livekit:7880
      LIVEKIT_WS_URL: ws://cowork-livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_VOICE_EVENT: voice.event
      CHANNEL_SERVICE_URL: http://cowork-channel:8083
      EUREKA_SERVER_URL: http://cowork-config:8761/eureka
      EUREKA_APP_NAME: cowork-voice
      EUREKA_INSTANCE_HOST: cowork-voice
      EUREKA_INSTANCE_PORT: "8084"
    ports:
      - "8084:8084"
    volumes:
      - cowork_logs:/var/log/cowork
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  postgres_data:
  mongo_data:
  kafka_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  cowork_logs:
  promtail_positions:
