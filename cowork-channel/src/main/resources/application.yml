server:
  port: 8083

spring:
  application:
    name: cowork-channel
  config:
    import: "optional:configserver:http://localhost:8761"
  datasource:
    url: jdbc:mysql://localhost:3306/cowork_channel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:cowork}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/actuator/**"
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
  response:
    not-wrapping-urls:
      - "/actuator/**"
      - "/v3/api-docs/**"
      - "/v3/api-docs"
      - "/swagger-ui/**"
  swagger:
    enabled: true
    title: "cowork-channel API"
    description: "cowork-channel 채널 관리 서비스 API"
    version: "v1"
    group: "channel"
    paths-to-match:
      - "/teams/**"

