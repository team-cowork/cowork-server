# 로컬 개발 전용 오버라이드. docker compose up 시 자동으로 병합된다.
# 소스에서 직접 빌드하는 build: 설정만 관리한다.
services:
  cowork-config:
    build:
      context: .
      dockerfile: cowork-config/local.dockerfile

  cowork-gateway:
    build:
      context: .
      dockerfile: cowork-gateway/local.dockerfile

  cowork-authorization:
    build:
      context: cowork-authorization
      dockerfile: local.dockerfile

  cowork-preference:
    build:
      context: .
      dockerfile: cowork-preference/local.dockerfile

  cowork-user:
    build:
      context: .
      dockerfile: cowork-user/local.dockerfile

  cowork-team:
    build:
      context: .
      dockerfile: cowork-team/local.dockerfile

  cowork-channel:
    build:
      context: .
      dockerfile: cowork-channel/local.dockerfile

  cowork-project:
    build:
      context: .
      dockerfile: cowork-project/local.dockerfile

  cowork-notification:
    build:
      context: cowork-notification
      dockerfile: local.dockerfile

  cowork-chat:
    build:
      context: cowork-chat
      dockerfile: local.dockerfile

  cowork-voice:
    build:
      context: cowork-voice
      dockerfile: local.dockerfile
