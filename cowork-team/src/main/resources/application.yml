server:
  port: 8085

spring:
  application:
    name: cowork-team
  config:
    import: "optional:configserver:http://localhost:8761"
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:cowork}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/actuator/**"
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
  response:
    not-wrapping-urls:
      - "/actuator/**"
      - "/v3/api-docs/**"
      - "/v3/api-docs"
      - "/swagger-ui/**"
  swagger:
    enabled: true
    title: "cowork-team API"
    description: "cowork-team 팀 관리 서비스 API"
    version: "v1"
    group: "team"
    paths-to-match:
      - "/teams/**"
      - "/team-members/**"

spring.cloud.aws:
  region:
    static: ${MINIO_REGION:ap-northeast-2}
  credentials:
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
  s3:
    endpoint: ${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}
    path-style-access-enabled: ${MINIO_PATH_STYLE_ACCESS_ENABLED:true}

minio:
  # presigned URL 서명용
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}}
  bucket: ${MINIO_BUCKET:cowork-bucket}
  public-base-url: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000/cowork-bucket}
  presigned-put-expiry-minutes: 10
  max-file-size-bytes: 1048576
  allowed-content-types:
    - image/jpeg
    - image/png
    - image/webp
