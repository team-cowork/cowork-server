global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: cowork

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Spring Boot 서비스 (Eureka 자동 감지) ──
  # eureka.instance.metadata-map에 prometheus.scrape=true가 있는 인스턴스만 스크랩
  - job_name: cowork-spring-services
    eureka_sd_configs:
      - server: http://host.docker.internal:8761/eureka
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_eureka_app_instance_metadata_prometheus_scrape]
        regex: "true"
        action: keep
      - source_labels: [__meta_eureka_app_instance_metadata_prometheus_path]
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_eureka_app_name]
        target_label: service
        regex: 'COWORK-(.*)'
        replacement: '${1}'
        action: replace

  # ── 비-Spring 서비스 (file_sd: JSON 파일만 수정하면 재시작 없이 반영) ──
  # 대상 파일: cowork-monitoring/prometheus/sd/external-services.json
  - job_name: cowork-external-services
    file_sd_configs:
      - files:
          - /etc/prometheus/sd/*.json
        refresh_interval: 30s

  # ── 인프라 Exporter (Docker 내부 고정 서비스) ──
  - job_name: infrastructure
    static_configs:
      - targets: ['mysqld_exporter:9104']
        labels:
          service: mysql
      - targets: ['redis_exporter:9121']
        labels:
          service: redis
      - targets: ['kafka_exporter:9308']
        labels:
          service: kafka
      - targets: ['postgres_exporter:9187']
        labels:
          service: postgres
