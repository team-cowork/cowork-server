global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      repeat_interval: 1h

receivers:
  - name: discord
    discord_configs:
      - webhook_url: '${DISCORD_WEBHOOK_URL}'
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        message: |-
          {{ range .Alerts }}
          **Service**: {{ .Labels.service }}
          **Severity**: {{ .Labels.severity }}
          {{ .Annotations.description }}
          {{ end }}
