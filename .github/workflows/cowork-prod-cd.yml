name: cowork prod CD Workflow

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag
        if: steps.version.outputs.skip == 'false'
        run: git tag v${{ steps.version.outputs.version }}

      - name: Push Tag
        if: steps.version.outputs.skip == 'false'
        run: git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes $'## 수정내역\n\n- '

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          status: ${{ job.status }}
          title: "cowork Server Prod CD"
          description: |
            Released `v${{ steps.version.outputs.version }}` · by **${{ github.actor }}**
