name: cowork prod CI Workflow

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Validate PR Title
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const allowedScopes = [
              'global', 'gateway', 'authorization', 'user',
              'team', 'project', 'channel', 'chat', 'voice',
              'config', 'ci/cd'
            ];

            const versionPattern = /^v\d{8}\.\d+$/;
            if (versionPattern.test(title)) {
              return;
            }

            const titlePattern = /^\[([^\]]+)\]\s+(.+)$/;
            const match = title.match(titlePattern);
            if (!match) {
              core.setFailed('Invalid title format. Use [scope] title or vYYYYMMDD.n format');
              return;
            }

            const scopesPart = match[1];
            const titlePart = match[2];

            if (titlePart.includes(':')) {
              core.setFailed('Colon (:) is not allowed in the title');
              return;
            }
            const scopes = scopesPart.split(',').map(s => s.trim());
            const invalidScopes = scopes.filter(scope => !allowedScopes.includes(scope));
            if (invalidScopes.length > 0) {
              core.setFailed(`Invalid scope(s): ${invalidScopes.join(', ')}`);
              return;
            }

  setup-pr-metadata:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Setup PR Metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-label "waiting for review:검토 대기"
          gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-assignee "$PR_AUTHOR"
          gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-reviewer "team-cowork/cowork-server"

  build-and-test:
    runs-on: ubuntu-latest
    needs: [validate-title]
    if: always() && (needs.validate-title.result == 'success' || needs.validate-title.result == 'skipped')

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cowork-gateway
            lang: kotlin
            gradle-task: ':cowork-gateway:build'
          - service: cowork-config
            lang: kotlin
            gradle-task: ':cowork-config:build'
          - service: cowork-user
            lang: kotlin
            gradle-task: ':cowork-user:build'
          - service: cowork-authorization
            lang: go
            working-directory: cowork-authorization
            go-version-file: cowork-authorization/go.mod
            go-build: 'go build ./...'
          - service: cowork-voice
            lang: go
            working-directory: cowork-voice
            go-version-file: cowork-voice/go.mod
            go-build: 'go build ./cmd/server'
          - service: cowork-chat
            lang: node
            working-directory: cowork-chat
            node-version: '22'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup JDK 21
        if: matrix.lang == 'kotlin'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        if: matrix.lang == 'kotlin'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: always
      - name: Build & Test (Kotlin)
        if: matrix.lang == 'kotlin'
        run: ./gradlew ${{ matrix.gradle-task }} --build-cache
      - name: Setup Go
        if: matrix.lang == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.go-version-file }}
          cache-dependency-path: ${{ matrix.working-directory }}/go.sum
      - name: Vet (Go)
        if: matrix.lang == 'go'
        working-directory: ${{ matrix.working-directory }}
        run: go vet ./...
      - name: Test (Go)
        if: matrix.lang == 'go'
        working-directory: ${{ matrix.working-directory }}
        run: go test ./...
      - name: Build (Go)
        if: matrix.lang == 'go'
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.go-build }}
      - name: Setup Node.js
        if: matrix.lang == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json
      - name: Install Dependencies (Node)
        if: matrix.lang == 'node'
        working-directory: ${{ matrix.working-directory }}
        run: npm ci
      - name: Build (Node)
        if: matrix.lang == 'node'
        working-directory: ${{ matrix.working-directory }}
        run: npm run build

  notify:
    runs-on: ubuntu-latest
    needs: [validate-title, setup-pr-metadata, build-and-test]
    if: always()

    steps:
      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.validate-title.result }}" == "failure" ]] || \
             [[ "${{ needs.build-and-test.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=0xFF4C4C" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.build-and-test.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=0x4CAF50" >> $GITHUB_OUTPUT
          else
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "color=0xFFA500" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          status: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          title: "Cowork Server Prod CI"
          description: |
            **Validate Title:** ${{ needs.validate-title.result }}
            **Setup Metadata:** ${{ needs.setup-pr-metadata.result }}
            **Build & Test:** ${{ needs.build-and-test.result }}
