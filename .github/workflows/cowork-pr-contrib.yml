name: cowork PR Contribution Delta

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'develop'
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  contrib-delta:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 차트 이미지를 ci-contrib-charts 브랜치에 업로드
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # base 와 비교하려면 전체 히스토리 필요

      - name: Fetch Base Branch
        run: git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: python -m pip install --quiet certifi matplotlib numpy

      - name: Build Contribution Delta Comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: python scripts/pr_contrib_delta.py

      - name: Generate After-Merge Report Image (artifact)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/contrib_report.py --out scripts/contrib_report.png

      - name: Upload Report Image
        uses: actions/upload-artifact@v4
        with:
          name: contrib-report-pr-${{ github.event.pull_request.number }}
          path: |
            scripts/contrib_report.png
            scripts/contrib_report.csv
          if-no-files-found: ignore

      - name: Upload Chart and Post or Replace PR Comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- contrib-delta-bot -->';
            const placeholder = '__CHART_URL__';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            let body = fs.readFileSync('scripts/pr_comment.md', 'utf8');

            // 차트 PNG 가 있으면 전용 브랜치에 올리고 commit-sha permalink 로 치환
            if (fs.existsSync('scripts/pr_chart.png')) {
              const branch = 'ci-contrib-charts';
              const path = `pr-${issue_number}.png`;
              const content = fs.readFileSync('scripts/pr_chart.png').toString('base64');

              let parentSha = null, baseTree = undefined;
              try {
                const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
                parentSha = ref.data.object.sha;
                const c = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
                baseTree = c.data.tree.sha;
              } catch (e) { /* 브랜치 없음 → orphan 루트 커밋 */ }

              const blob = await github.rest.git.createBlob({ owner, repo, content, encoding: 'base64' });
              const tree = await github.rest.git.createTree({
                owner, repo, base_tree: baseTree,
                tree: [{ path, mode: '100644', type: 'blob', sha: blob.data.sha }],
              });
              const commit = await github.rest.git.createCommit({
                owner, repo, message: `chart: pr-${issue_number}`,
                tree: tree.data.sha, parents: parentSha ? [parentSha] : [],
              });
              if (parentSha) {
                await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: commit.data.sha, force: true });
              } else {
                await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: commit.data.sha });
              }
              const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${commit.data.sha}/${path}`;
              body = body.split(placeholder).join(rawUrl);
            }

            // 갱신 시 기존 봇 코멘트는 삭제하고 새로 작성
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            for (const c of comments) {
              if (c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
