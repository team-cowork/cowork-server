name: cowork PR Cleanup Workflow

on:
  pull_request:
    types: [closed]

jobs:
  remove-label-on-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Remove Waiting for Review Label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          LABEL="waiting for review:검토 대기"

          echo "Removing label '$LABEL' from PR #$PR_NUMBER..."
          gh pr edit $PR_NUMBER --repo ${{ github.repository }} --remove-label "$LABEL" || true
          echo "Done."

  remove-contrib-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Remove Contribution Delta Comment
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- contrib-delta-bot -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 });
            for (const c of comments) {
              if (c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
