basePath: /api
definitions:
  github_com_cowork_authorization_internal_service.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
info:
  contact: {}
  description: 인증/인가 서비스 — DataGSM OAuth2 PKCE 로그인, JWT 액세스/리프레시 토큰 발급 및 갱신
  title: Cowork Authorization API
  version: "20260602.0"
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 리프레시 토큰으로 새로운 액세스/리프레시 토큰 쌍을 발급합니다.
      parameters:
      - description: 리프레시 토큰
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 새 access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: refresh_token is required
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid or expired refresh token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 액세스 토큰 갱신
      tags:
      - auth
  /auth/signout:
    post:
      consumes:
      - application/json
      description: 리프레시 토큰을 무효화합니다. Authorization 헤더(Bearer) 필요.
      parameters:
      - description: 리프레시 토큰
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "204":
          description: 로그아웃 성공
        "400":
          description: refresh_token is required
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 로그아웃
      tags:
      - auth
  /auth/token:
    post:
      consumes:
      - application/json
      description: 프론트엔드가 DataGSM에서 직접 받은 인가 코드와 code_verifier로 액세스/리프레시 토큰을 발급합니다.
      parameters:
      - description: 코드 교환 요청
        in: body
        name: body
        required: true
        schema:
          properties:
            code:
              type: string
            code_verifier:
              type: string
            redirect_uri:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cowork_authorization_internal_service.TokenPair'
        "400":
          description: missing required fields
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: authentication failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 토큰 발급 (PKCE code exchange)
      tags:
      - auth
  /events/datagsm:
    post:
      consumes:
      - application/json
      description: DataGSM이 전송하는 student 라이프사이클 이벤트를 수신해 user 동기화 스트림으로 전달합니다. X-DataGSM-Signature(HMAC-SHA256)
        검증 후 처리합니다.
      parameters:
      - description: sha256=<HMAC-SHA256(secret, body)>
        in: header
        name: X-DataGSM-Signature
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 수신 완료
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 서명 검증 실패
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: webhook secret 미설정
          schema:
            additionalProperties:
              type: string
            type: object
      summary: DataGSM webhook 수신
      tags:
      - events
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 헬스체크
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: '"Bearer {access_token}" 형식으로 입력하세요.'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
