basePath: /api
host: localhost:8080
info:
  contact: {}
  description: 인증/인가 서비스 — Google OAuth2 로그인, JWT 액세스/리프레시 토큰 발급 및 갱신
  title: Cowork Authorization API
  version: "1.0"
paths:
  /auth/callback:
    get:
      description: OAuth provider가 리다이렉트하는 콜백 엔드포인트입니다. 액세스/리프레시 토큰을 반환합니다.
      parameters:
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: CSRF 방지용 state 파라미터
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: missing oauth state cookie
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: authentication failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: OAuth 콜백 처리
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 리프레시 토큰으로 새로운 액세스/리프레시 토큰 쌍을 발급합니다.
      parameters:
      - description: 리프레시 토큰
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 새 access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: refresh_token is required
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid or expired refresh token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 액세스 토큰 갱신
      tags:
      - auth
  /auth/signin:
    get:
      description: Google OAuth 로그인 페이지로 리다이렉트합니다. state 쿠키가 자동으로 설정됩니다.
      responses:
        "302":
          description: OAuth provider로 리다이렉트
          schema:
            type: string
      summary: OAuth 로그인 리다이렉트
      tags:
      - auth
  /auth/signout:
    post:
      consumes:
      - application/json
      description: 리프레시 토큰을 무효화합니다. Authorization 헤더(Bearer) 필요.
      parameters:
      - description: 리프레시 토큰
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "204":
          description: 로그아웃 성공
        "400":
          description: refresh_token is required
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 로그아웃
      tags:
      - auth
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 헬스체크
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: '"Bearer {access_token}" 형식으로 입력하세요.'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
