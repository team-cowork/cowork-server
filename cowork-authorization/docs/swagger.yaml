basePath: /api
definitions:
  service.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
info:
  contact: {}
  description: 인증/인가 서비스 — DataGSM OAuth2 PKCE 로그인, JWT 액세스/리프레시 토큰 발급 및 갱신
  title: Cowork Authorization API
  version: "1.0"
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 리프레시 토큰으로 새로운 액세스/리프레시 토큰 쌍을 발급합니다.
      parameters:
      - description: 리프레시 토큰
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 새 access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: refresh_token is required
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid or expired refresh token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 액세스 토큰 갱신
      tags:
      - auth
  /auth/signin:
    get:
      description: 프론트엔드가 PKCE 파라미터(code_challenge, code_challenge_method, state,
        redirect_uri)를 제공하면 DataGSM 인가 URL을 반환합니다.
      parameters:
      - description: 리다이렉트 URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: PKCE code challenge
        in: query
        name: code_challenge
        required: true
        type: string
      - description: PKCE code challenge method (S256)
        in: query
        name: code_challenge_method
        required: true
        type: string
      - description: CSRF 방지용 state
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: auth_url
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: missing required parameters
          schema:
            additionalProperties:
              type: string
            type: object
      summary: OAuth 로그인 URL 반환 (PKCE)
      tags:
      - auth
  /auth/signout:
    post:
      consumes:
      - application/json
      description: 리프레시 토큰을 무효화합니다. Authorization 헤더(Bearer) 필요.
      parameters:
      - description: 리프레시 토큰
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "204":
          description: 로그아웃 성공
        "400":
          description: refresh_token is required
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 로그아웃
      tags:
      - auth
  /auth/token:
    post:
      consumes:
      - application/json
      description: 프론트엔드가 DataGSM에서 받은 인가 코드와 code_verifier로 액세스/리프레시 토큰을 발급합니다.
      parameters:
      - description: 코드 교환 요청
        in: body
        name: body
        required: true
        schema:
          properties:
            code:
              type: string
            code_verifier:
              type: string
            redirect_uri:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.TokenPair'
        "400":
          description: missing required fields
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: authentication failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 토큰 발급 (PKCE code exchange)
      tags:
      - auth
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 헬스체크
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: '"Bearer {access_token}" 형식으로 입력하세요.'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
