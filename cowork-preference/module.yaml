product: jvm/app
layout: maven-like
dependencies:
  - bom: io.vertx:vertx-stack-depchain:5.1.1
  - io.vertx:vertx-core
  - io.vertx:vertx-web
  - io.vertx:vertx-lang-kotlin
  - io.vertx:vertx-lang-kotlin-coroutines
  - io.vertx:vertx-config
  - io.vertx:vertx-pg-client
  - io.vertx:vertx-redis-client
  - io.vertx:vertx-kafka-client
  - io.vertx:vertx-service-discovery
  - io.vertx:vertx-micrometer-metrics
  - com.ongres.scram:client:2.1
  - io.micrometer:micrometer-registry-prometheus-simpleclient:1.17.0
  - com.netflix.eureka:eureka-client:2.0.6
  - org.flywaydb:flyway-core:12.8.1
  - org.flywaydb:flyway-database-postgresql:12.8.1
  - org.postgresql:postgresql:42.7.11
  - org.apache.logging.log4j:log4j-core:2.26.0
  - org.apache.logging.log4j:log4j-layout-template-json:2.26.0
  - org.apache.logging.log4j:log4j-slf4j2-impl:2.26.0
  - $kotlin.reflect
  - org.jetbrains.kotlinx:kotlinx-coroutines-core:1.11.0

test-dependencies:
  - io.vertx:vertx-junit5:5.1.1

settings:
  jvm:
    mainClass: com.cowork.preference.CoworkPreferenceMainKt
    release: 25
    jdk:
      version: 25
  kotlin:
    version: 2.4.0
    freeCompilerArgs: [-Xjsr305=strict]
