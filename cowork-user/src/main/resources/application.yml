server:
  port: 8082

spring:
  application:
    name: cowork-user
  config:
    import: "optional:configserver:http://localhost:8761"
  datasource:
    url: jdbc:mysql://localhost:3306/cowork_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:cowork}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: cowork-user
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.cowork.user.messaging.event"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

spring.cloud.aws:
  region:
    static: ${AWS_REGION:ap-northeast-2}
  credentials:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

s3:
  bucket: ${S3_BUCKET:cowork-bucket}
  presigned-put-expiry-minutes: 5
  presigned-get-expiry-minutes: 15
  max-file-size-bytes: 5242880  # 5MB
  allowed-content-types:
    - image/jpeg
    - image/png
    - image/webp

sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
  response:
    enabled: false
  swagger:
    enabled: true
    title: "cowork-user API"
    description: "cowork-user 사용자 관리 서비스 API"
    version: "v1"
    group: "user"
    paths-to-match:
      - "/users/**"
  exception:
    enabled: false
