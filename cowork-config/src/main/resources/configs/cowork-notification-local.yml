server:
  port: 8086

db:
  dsn: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/cowork_notification?charset=utf8mb4&parseTime=True&loc=Local

kafka:
  brokers: kafka:9092
  topic: notification.trigger
  group-id: cowork-notification

fcm:
  credentials-file: /run/secrets/firebase-credentials.json

preference:
  service-url: http://cowork-preference:9001

team:
  service-url: http://cowork-team:8085

user:
  service-url: http://cowork-user:8082

eureka:
  server-url: http://cowork-config:8761/eureka
  app-name: cowork-notification
  instance:
    host: cowork-notification
    port: 8086
