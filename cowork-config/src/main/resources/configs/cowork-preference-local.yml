server:
  port: 9001

spring:
  application:
    name: cowork-preference

preference:
  db:
    host: localhost
    port: 5432
    database: cowork_preference
    schema: preference
    username: ${POSTGRES_USER:cowork}
    password: ${POSTGRES_PASSWORD:}
    pool-size: 5
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

eureka:
  url: http://localhost:8761/eureka/
  app-name: cowork-preference
  instance:
    host: localhost
