# MONGODB_URI는 Vault secret/cowork-chat 에서 주입됨
PORT: 8087
MONGODB_DIRECT_CONNECTION: false
MONGODB_SERVER_SELECTION_TIMEOUT_MS: 5000
MONGODB_CONNECT_TIMEOUT_MS: 5000
KAFKA_BOOTSTRAP_SERVERS: kafka:9092
PROJECT_SERVICE_URL: http://cowork-project:8084
EUREKA_ENABLED: true
EUREKA_SERVER_URL: http://cowork-config:8761/eureka
EUREKA_APP_NAME: cowork-chat
EUREKA_INSTANCE_HOST: cowork-chat
EUREKA_LEASE_RENEWAL_SECONDS: 30
MINIO_INTERNAL_ENDPOINT: http://minio:9000
MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000/cowork-bucket}
MINIO_BUCKET: ${MINIO_BUCKET:cowork-bucket}
MINIO_CHAT_MAX_FILE_SIZE_BYTES: ${MINIO_CHAT_MAX_FILE_SIZE_BYTES:104857600}
MINIO_CHAT_ALLOWED_CONTENT_TYPES: ${MINIO_CHAT_ALLOWED_CONTENT_TYPES:video/mp4,video/quicktime,video/x-msvideo,audio/mpeg,audio/ogg,audio/wav,audio/mp4,image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain}
MINIO_CHAT_UPLOAD_RATE_LIMIT_WINDOW_MS: ${MINIO_CHAT_UPLOAD_RATE_LIMIT_WINDOW_MS:60000}
MINIO_CHAT_UPLOAD_RATE_LIMIT_MAX_REQUESTS: ${MINIO_CHAT_UPLOAD_RATE_LIMIT_MAX_REQUESTS:20}
