spring.cloud.aws:
  region:
    static: us-east-1
  credentials:
    access-key: ${MINIO_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
    secret-key: ${MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin}}
  s3:
    endpoint: ${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}
    path-style-access-enabled: true

minio:
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}}

s3:
  base-url: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000/cowork-bucket}
