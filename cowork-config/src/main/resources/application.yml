server:
  port: 8761

spring:
  application:
    name: cowork-config
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    bus:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh, busrefresh, monitor
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs/

---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    config:
      server:
        composite:
          - type: vault
            host: ${VAULT_HOST:localhost}
            port: ${VAULT_PORT:8200}
            scheme: ${VAULT_SCHEME:http}
            authentication: TOKEN
            token: ${VAULT_TOKEN:dev-root-token}
            kv-version: 2
            backend: secret
            profile-separator: "/"
            default-context: application
          - type: native
            search-locations: classpath:/configs/

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    config:
      server:
        composite:
          - type: vault
            host: ${VAULT_HOST}
            port: ${VAULT_PORT:8200}
            scheme: https
            authentication: TOKEN
            token: ${VAULT_TOKEN}
            kv-version: 2
            backend: secret
            profile-separator: "/"
            default-context: application
          - type: git
            uri: ${CONFIG_GIT_URI}
            username: ${CONFIG_GIT_USERNAME}
            password: ${CONFIG_GIT_PASSWORD}
            default-label: main
            clone-on-start: true
            force-pull: true