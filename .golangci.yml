version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: docs/
        linters:
          - misspell
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports