global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: cowork

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Spring Boot 서비스 (WSL2 호스트에서 실행) ──
  - job_name: cowork-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: gateway

  - job_name: cowork-config
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8761']
        labels:
          service: config

  - job_name: cowork-user
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: user

  - job_name: cowork-team
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: team

  # ── Vert.x 서비스 ──
  - job_name: cowork-preference
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9001']
        labels:
          service: preference

  # ── Golang 서비스 ──
  - job_name: cowork-authorization
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: authorization

  - job_name: cowork-voice
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9000']
        labels:
          service: voice

  # ── NestJS 서비스 ──
  - job_name: cowork-chat
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: chat

  # ── 인프라 Exporter (Docker 내부 네트워크) ──
  - job_name: mysql
    static_configs:
      - targets: ['mysqld_exporter:9104']
        labels:
          service: mysql

  - job_name: redis
    static_configs:
      - targets: ['redis_exporter:9121']
        labels:
          service: redis

  - job_name: kafka
    static_configs:
      - targets: ['kafka_exporter:9308']
        labels:
          service: kafka

  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: postgres
